async function fsave(key,data){
  try{ await setDoc(doc(db,UID,key),{value:JSON.stringify(data)}); }catch(e){console.error("Erro salvar:",e);}
}
async function fload(key,fb){
  try{ const d=await getDoc(doc(db,UID,key)); return d.exists()?JSON.parse(d.data().value):fb; }catch{return fb;}
}

  // form obra
  showFormObra:false, foId:"", foNome:"", foCliente:"", foEndereco:"",
  foStatus:"Planejamento", foPrazo:"", foValor:"", foThumb:"🏠",
  // checklist
  checkData:{}, etapaSel:null,
  // diario
  diarioEntries:[], showDiarioForm:false, dClima:"☀️ Ensolarado", dEquipe:"", dServicos:"", dObs:"",
  // custos
  custosList:[], showCustoForm:false, showImport:false,

function set(obj){ S={...S,...obj}; render(); }

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML = html();
}

function reContent(){
  const el=document.getElementById("page-content");
  if(el) el.innerHTML=pageContent();
}

function reAba(){
  const el=document.getElementById("aba-content");
  if(el) el.innerHTML=abaContent();
}

function rePrest(){
  const el=document.getElementById("page-content");
  if(el) el.innerHTML=pageContent();
}

// ── Logo ──────────────────────────────────────────────────────────────────────
function logo(){
  return `<div style="display:flex;align-items:center;gap:8px">
    <svg width="36" height="36" viewBox="0 0 80 80">
      <rect x="6" y="8" width="11" height="64" fill="#5a6475" rx="2"/>
      <rect x="6" y="34" width="34" height="10" fill="#5a6475" rx="2"/>
      <rect x="32" y="8" width="28" height="8" fill="#c0431a" rx="1"/>
      <rect x="32" y="18" width="28" height="7" fill="#d4541f" rx="1"/>
      <rect x="32" y="27" width="28" height="7" fill="#c0431a" rx="1"/>
      <rect x="32" y="36" width="28" height="7" fill="#d4541f" rx="1"/>
      <rect x="32" y="45" width="28" height="7" fill="#c0431a" rx="1"/>
      <rect x="32" y="54" width="28" height="8" fill="#d4541f" rx="1"/>
      <rect x="32" y="62" width="28" height="10" fill="#c0431a" rx="1"/>
    </svg>
    <div>
      <div style="font-weight:900;font-size:15px;color:#3d4450;letter-spacing:1px;line-height:1">HABITA</div>
      <div style="font-weight:600;font-size:9px;color:#5a6475;letter-spacing:3px;line-height:1;margin-top:2px">CONSTRUTORA</div>
    </div>
  </div>`;
}

function bar(pct,color="#F59E0B",h=6){
  return `<div style="background:#F3F4F6;border-radius:99px;height:${h}px;overflow:hidden"><div style="width:${Math.min(pct||0,100)}%;height:${h}px;background:${color};border-radius:99px;transition:width .4s"></div></div>`;
}
function bdg(s){
  const [bg,cl]=STATUS_C[s]||["#F3F4F6","#374151"];
  return `<span style="background:${bg};color:${cl};font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;white-space:nowrap">${s}</span>`;
}
function card(content,style="",onclick=""){
  return `<div ${onclick?`onclick="${onclick}"`:""} style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px;${style}">${content}</div>`;
}
function inp(id,label,value,type="text",placeholder="",req=false){
  return `<div style="margin-bottom:12px">
    ${label?`<div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:4px;text-transform:uppercase">${label}${req?'<span style="color:#EF4444"> *</span>':""}</div>`:""}
    <input id="${id}" type="${type}" value="${(value||"").toString().replace(/"/g,'&quot;')}" placeholder="${placeholder}" style="width:100%;padding:9px 12px;border:1px solid #E5E7EB;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;background:#FAFAFA"/>
  </div>`;
}
function sel(id,label,value,opts){
  return `<div style="margin-bottom:12px">
    ${label?`<div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:4px;text-transform:uppercase">${label}</div>`:""}
    <select id="${id}" style="width:100%;padding:9px 12px;border:1px solid #E5E7EB;border-radius:10px;font-size:14px;outline:none;background:#FAFAFA;box-sizing:border-box">
      ${opts.map(o=>typeof o==="string"?`<option ${value===o?"selected":""}>${o}</option>`:`<option value="${o.v}" ${value===o.v?"selected":""}>${o.l}</option>`).join("")}
    </select>
  </div>`;
}
function toggle(label,trueLabel,falseLabel,isTrue,onTrue,onFalse){
  return `<div style="margin-bottom:12px">
    ${label?`<div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:6px;text-transform:uppercase">${label}</div>`:""}
    <div style="display:flex;gap:8px">
      <button onclick="${onTrue}" style="flex:1;padding:9px 0;border-radius:10px;border:${isTrue?"2px solid #059669":"1px solid #E5E7EB"};background:${isTrue?"#D1FAE5":"#F9FAFB"};color:${isTrue?"#065F46":"#6B7280"};font-weight:700;font-size:13px;cursor:pointer">${trueLabel}</button>
      <button onclick="${onFalse}" style="flex:1;padding:9px 0;border-radius:10px;border:${!isTrue?"2px solid #F59E0B":"1px solid #E5E7EB"};background:${!isTrue?"#FEF3C7":"#F9FAFB"};color:${!isTrue?"#92400E":"#6B7280"};font-weight:700;font-size:13px;cursor:pointer">${falseLabel}</button>
    </div>
  </div>`;
}

// ── HTML Principal ────────────────────────────────────────────────────────────
function html(){
  const NAV=[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"obras",icon:"🏗️",label:"Obras"},{id:"prestadores",icon:"👷",label:"Equipe"},{id:"checklist_g",icon:"✅",label:"Checklist"},{id:"custos_g",icon:"💰",label:"Custos"}];
  return `<div style="min-height:100vh;background:#F9FAFB">
    <div style="background:#fff;border-bottom:1px solid #F3F4F6;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9">
      ${logo()}
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="exportarBackup()" style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:#065F46;font-weight:600">💾 Backup</button>
        <div style="width:32px;height:32px;background:#F59E0B;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:11px">HC</div>
      </div>
    </div>
    <div style="max-width:640px;margin:0 auto;padding:16px 16px 90px" id="page-content">
      ${S.loading?`<div style="text-align:center;padding:60px;color:#9CA3AF">⏳ Carregando...</div>`:pageContent()}
    </div>
    <nav style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F3F4F6;display:flex;z-index:20">
      ${NAV.map(n=>{
        const active=S.page===n.id||(S.page==="obra_det"&&n.id==="obras");
        return `<button onclick="navTo('${n.id}')" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;border:none;background:transparent;cursor:pointer;gap:2px">
          <span style="font-size:20px;line-height:1">${n.icon}</span>
          <span style="font-size:10px;font-weight:700;color:${active?"#F59E0B":"#9CA3AF"}">${n.label}</span>
          ${active?`<div style="width:4px;height:4px;border-radius:50%;background:#F59E0B"></div>`:""}
        </button>`;
      }).join("")}
    </nav>
    ${S.showFormObra?formObraHTML():""}
  </div>`;
}

function pageContent(){
  if(S.page==="obra_det"&&S.obraSel) return obraDetalheHTML();
  if(S.page==="dashboard")   return dashboardHTML();
  if(S.page==="obras")       return obrasHTML();
  if(S.page==="prestadores") return prestadoresHTML();
  if(S.page==="checklist_g"||S.page==="custos_g") return selecionarObraHTML();
  return dashboardHTML();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function dashboardHTML(){
  const at=S.obras.filter(o=>o.status==="Em andamento").length;
  const fi=S.obras.filter(o=>o.status==="Finalizada").length;
  const al=S.obras.filter(o=>o.status==="Atrasada").length;
  const ct=S.obras.reduce((a,o)=>a+(o.custoAtual||0),0);
  return `<div style="padding-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-weight:900;font-size:20px;color:#1F2937">Visão Geral</div>
        <div style="font-size:12px;color:#9CA3AF;text-transform:capitalize">${new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      ${[["🔨","Em andamento",at,"#F59E0B"],["✅","Concluídas",fi,"#059669"],["⚠️","Atrasadas",al,"#DC2626"],["💰","Custo total",fmt(ct),"#374151"]].map(([ic,lb,v,c])=>`
        <div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:14px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">${ic}</span>
            <div><div style="font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase">${lb}</div><div style="font-size:20px;font-weight:900;color:${c}">${v}</div></div>
          </div>
        </div>`).join("")}
    </div>
    ${al>0?`<div style="background:#FFF5F5;border:1px solid #FCA5A5;border-radius:12px;padding:14px;margin-bottom:14px;display:flex;gap:10px;align-items:center"><span style="font-size:20px">🚨</span><div><div style="font-weight:700;color:#DC2626;font-size:13px">${al} obra(s) atrasada(s)</div></div></div>`:""}
    ${S.obras.length===0?`<div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:40px;text-align:center"><div style="font-size:48px;margin-bottom:12px">🏗️</div><div style="font-weight:800;font-size:17px;color:#374151;margin-bottom:6px">Bem-vindo à Habita!</div><div style="font-size:14px;color:#6B7280">Vá em <b>Obras</b> e adicione sua primeira obra.</div></div>`:`
      <div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px">
        <div style="font-weight:700;font-size:12px;color:#6B7280;text-transform:uppercase;margin-bottom:12px">Andamento das obras</div>
        ${S.obras.filter(o=>o.status!=="Finalizada").slice(0,5).map(o=>`
          <div style="margin-bottom:12px;cursor:pointer" onclick="abrirObra('${o.id}')">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:13px;font-weight:700;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">${o.nome}</span>
              <span style="font-size:12px;font-weight:800;color:#F59E0B;flex-shrink:0">${o.progresso||0}%</span>
            </div>
            ${bar(o.progresso||0,o.status==="Atrasada"?"#F87171":"#F59E0B")}
          </div>`).join("")}
      </div>`}
  </div>`;
}

// ── Obras ─────────────────────────────────────────────────────────────────────
function obrasHTML(){
  const list=S.obras.filter(o=>{
    const m=(S.buscaObra||"")===""||o.nome.toLowerCase().includes((S.buscaObra||"").toLowerCase())||o.cliente.toLowerCase().includes((S.buscaObra||"").toLowerCase());
    return m&&((S.filtroObra||"Todas")==="Todas"||o.status===(S.filtroObra||"Todas"));
  });
  return `<div style="padding-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:800;font-size:20px;color:#1F2937">Obras</div>
      <button onclick="abrirFormObra()" style="background:#F59E0B;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer">+ Nova obra</button>
    </div>
    <input oninput="S.buscaObra=this.value;reContent()" value="${S.buscaObra||""}" placeholder="🔍  Buscar obra ou cliente..." style="width:100%;padding:9px 14px;border:1px solid #E5E7EB;border-radius:12px;font-size:14px;outline:none;margin-bottom:12px;box-sizing:border-box"/>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px">
      ${["Todas",...STATUS_LIST].map(f=>`<button onclick="S.filtroObra='${f}';reContent()" style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:${(S.filtroObra||"Todas")===f?"none":"1px solid #E5E7EB"};background:${(S.filtroObra||"Todas")===f?"#F59E0B":"#fff"};color:${(S.filtroObra||"Todas")===f?"#fff":"#6B7280"};font-weight:700;font-size:12px;cursor:pointer">${f}</button>`).join("")}
    </div>
    ${list.length===0?`<div style="text-align:center;padding:48px 0;color:#9CA3AF">Nenhuma obra encontrada.</div>`:""}

  const ck=S.checkData||{};
  if(S.etapaSel){
    const etapa=ETAPAS.find(e=>e.id===S.etapaSel);
    const eApr=etapa.itens.filter(it=>ck[`${etapa.id}_${it}`]==="ok").length;
    return `<div>
      <button onclick="S.etapaSel=null;reAba()" style="color:#F59E0B;font-weight:700;font-size:14px;background:none;border:none;cursor:pointer;margin-bottom:16px;padding:0">← Voltar às etapas</button>

          return `<div style="background:${st==="ok"?"#F0FDF4":st==="nok"?"#FFF5F5":"#fff"};border-radius:14px;border:${st==="ok"?"1px solid #A7F3D0":st==="nok"?"1px solid #FCA5A5":"1px solid #F3F4F6"};padding:16px">

              ${st?`<button onclick="setCheck('${etapa.id}','${esc}',null)" style="padding:8px 12px;border-radius:10px;border:none;background:#F3F4F6;color:#6B7280;font-weight:700;font-size:12px;cursor:pointer">↩</button>`:""}
            </div>
          </div>`;
        }).join("")}

  const rep=Object.values(ck).filter(v=>v==="nok").length;
  return `<div style="display:flex;flex-direction:column;gap:12px">
    <div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px">
      <div style="font-weight:700;font-size:12px;color:#6B7280;text-transform:uppercase;margin-bottom:10px">Progresso geral</div>

    </div>
    ${ETAPAS.map(etapa=>{
      const a=etapa.itens.filter(it=>ck[`${etapa.id}_${it}`]==="ok").length;
      const r=etapa.itens.filter(it=>ck[`${etapa.id}_${it}`]==="nok").length;
      return `<div onclick="S.etapaSel='${etapa.id}';reAba()" style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px;cursor:pointer">

      </div>`;
    }).join("")}
  </div>`;
}

// ── Aba Custos ────────────────────────────────────────────────────────────────
function abaCustosHTML(){
  const o=S.obraSel,custos=S.custosList||[];
  const prev=parseFloat(o.valorPrevisto)||0;
  const total=custos.reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tPago=custos.filter(c=>c.pago!==false).reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tPend=custos.filter(c=>c.pago===false).reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tMO=custos.filter(c=>c.cat==="Mão de obra").reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tMat=custos.filter(c=>c.cat==="Material").reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tOut=custos.filter(c=>c.cat!=="Mão de obra"&&c.cat!=="Material").reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const pMO=prev>0?Math.round(tMO/prev*100):0;
  const pMat=prev>0?Math.round(tMat/prev*100):0;
  const pOut=prev>0?Math.round(tOut/prev*100):0;

  return `<div style="display:flex;flex-direction:column;gap:12px">
    ${prev>0?`
    <!-- Resumo -->
    <div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:1;background:#F9FAFB;border-radius:10px;padding:10px 12px;text-align:center"><div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;font-weight:700">Previsto</div><div style="font-size:16px;font-weight:900;color:#374151">${fmt(prev)}</div></div>
        <div style="flex:1;background:#F9FAFB;border-radius:10px;padding:10px 12px;text-align:center"><div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;font-weight:700">Realizado</div><div style="font-size:16px;font-weight:900;color:${total>prev?"#DC2626":"#F59E0B"}">${fmt(total)}</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:1;background:#F0FDF4;border:1px solid #A7F3D0;border-radius:10px;padding:8px 12px;text-align:center"><div style="font-size:11px;color:#065F46;font-weight:700">✅ Pago</div><div style="font-size:15px;font-weight:900;color:#059669">${fmt(tPago)}</div></div>
        <div style="flex:1;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:8px 12px;text-align:center"><div style="font-size:11px;color:#92400E;font-weight:700">⏳ Pendente</div><div style="font-size:15px;font-weight:900;color:#F59E0B">${fmt(tPend)}</div></div>
      </div>
      ${bar(prev>0?Math.round(total/prev*100):0,8,total>prev?"#F87171":"#34D399")}
      <div style="font-size:12px;color:${prev-total>=0?"#059669":"#DC2626"};font-weight:700;margin-top:6px">${prev-total>=0?`✅ Saldo: ${fmt(prev-total)}`:`⚠️ Acima do orçamento: ${fmt(total-prev)}`}</div>
    </div>
    <!-- Análise -->

      ${tOut>0?`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#374151">📦 Outros</span><span style="font-size:13px;font-weight:900;color:#6B7280">${pOut}%</span></div>${bar(Math.min(pOut,100),10,"#A5B4FC")}<div style="font-size:11px;color:#9CA3AF;margin-top:2px">Realizado: <b style="color:#374151">${fmt(tOut)}</b></div></div>`:""}

            <div style="font-weight:700;font-size:13px;color:#1F2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.desc}</div>

      ${S.importErro?`<div style="background:#FFF5F5;border:1px solid #FCA5A5;border-radius:10px;padding:10px;margin-bottom:10px;font-size:13px;color:#DC2626;font-weight:700">⚠️ ${S.importErro}</div>`:""}
      <div style="display:flex;gap:8px">
        <button onclick="S.showImport=false;S.importPreview=[];S.importErro='';reAba()" style="flex:1;padding:10px;border-radius:10px;border:1px solid #E5E7EB;background:transparent;color:#6B7280;font-weight:700;cursor:pointer">Cancelar</button>
        ${S.importPreview?.length?`<button onclick="confirmarImport()" style="flex:1;padding:10px;border-radius:10px;border:none;background:#6366F1;color:#fff;font-weight:700;cursor:pointer">💾 Importar ${S.importPreview.length}</button>`:""}

    <!-- Form novo custo -->
    ${S.showCustoForm?`<div style="background:#fff;border-radius:14px;border:1px solid #FDE68A;padding:16px">

        <select id="c-fase" style="width:100%;padding:9px 12px;border:1px solid #E5E7EB;border-radius:10px;font-size:14px;outline:none;background:#FAFAFA;box-sizing:border-box">
          <option value="">Selecione a fase (opcional)</option>
          ${FASES_OBRA.map(f=>`<option value="${f.nome}" ${S.cFase===f.nome?"selected":""}>#${f.id} ${f.nome}${f.pct?" ("+(f.pct*100).toFixed(1)+"%)":""}</option>`).join("")}
        </select>
      </div>
      <div style="margin-bottom:12px">

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">

        <div><div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:4px;text-transform:uppercase">Data</div><input id="c-data" type="date" value="${S.cData||today()}" style="width:100%;padding:9px 12px;border:1px solid #E5E7EB;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;background:#FAFAFA"/></div>
      </div>
      ${inp("c-forn","Fornecedor",S.cForn,"text","Nome do fornecedor")}

    </div>`:""}

    <!-- Lista custos -->
    ${custos.length===0&&!S.showCustoForm&&!S.showImport?`<div style="text-align:center;padding:24px 0;color:#9CA3AF">Nenhum custo lançado ainda.</div>`:""}
    ${custos.map(c=>`<div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:14px">
      <div style="display:flex;align-items:center;gap:10px">

        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.desc}</div>
          <div style="font-size:11px;color:#9CA3AF">${c.fornecedor||"—"} · ${fmtD(c.data)}</div>
          ${c.fase?`<div style="font-size:11px;color:#6366F1;font-weight:600;margin-top:2px">🏗️ ${c.fase}</div>`:""}
          <button onclick="togglePagoCusto('${c.id}')" style="font-size:11px;padding:2px 8px;border-radius:8px;border:none;background:${c.pago!==false?"#D1FAE5":"#FEF3C7"};color:${c.pago!==false?"#065F46":"#92400E"};font-weight:700;cursor:pointer;margin-top:4px">${c.pago!==false?"✅ Pago":"⏳ Pendente"}</button>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:900;font-size:15px;color:#F59E0B">${fmt(c.valor)}</div>
          <button onclick="if(confirm('Remover?'))deletarCusto('${c.id}')" style="background:transparent;border:none;cursor:pointer;font-size:16px">🗑️</button>
        </div>
      </div>
    </div>`).join("")}
  </div>`;
}

function prestadoresHTML(){
  if(S.viewPrest==="form_prest") return formPrestHTML();
  if(S.viewPrest==="form_diaria") return formDiariaHTML();
  if(S.viewPrest==="detalhe"&&S.selPrest) return detalhePrestHTML();
  return listaPrestHTML();
}

function formPrestHTML(){
  return `<div style="padding-bottom:20px">
    <button onclick="S.viewPrest='lista';rePrest()" style="background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:8px 14px;cursor:pointer;font-weight:700;color:#374151;margin-bottom:16px;font-size:14px">← Voltar</button>
    <div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px">
      <div style="font-weight:800;font-size:16px;color:#1F2937;margin-bottom:16px">👷 Novo Prestador</div>
      ${inp("p-nome","Nome completo",S.pNome,"text","Ex: Carlos Pereira",true)}
      ${sel("p-funcao","Função",S.pFuncao,FUNCOES)}
      ${inp("p-diaria","Valor da diária (R$)",S.pDiaria,"number","Ex: 180")}
      <div style="display:flex;gap:8px;margin-top:4px">
        <button onclick="S.viewPrest='lista';rePrest()" style="flex:1;padding:10px;border-radius:10px;border:1px solid #E5E7EB;background:transparent;color:#6B7280;font-weight:700;cursor:pointer">Cancelar</button>
        <button onclick="salvarPrestador()" style="flex:1;padding:10px;border-radius:10px;border:none;background:#F59E0B;color:#fff;font-weight:700;cursor:pointer">Salvar prestador</button>
      </div>

  </div>`;
}

function formDiariaHTML(){
  const ps=S.prestadores.find(p=>p.id===S.fDPrestId);
  const vp=S.fDOc==="Trabalhou"?(ps?.diaria||0):S.fDOc==="Meio período"?(ps?.diaria||0)/2:0;
  return `<div style="padding-bottom:20px">
    <button onclick="S.viewPrest=S.selPrest?'detalhe':'lista';rePrest()" style="background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:8px 14px;cursor:pointer;font-weight:700;color:#374151;margin-bottom:16px;font-size:14px">← Voltar</button>
    <div style="background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px">
      <div style="font-weight:800;font-size:16px;color:#1F2937;margin-bottom:16px">📋 Registrar Diária</div>
      ${sel("fd-prest","Prestador",S.fDPrestId,[{v:"",l:"Selecione..."},...S.prestadores.map(p=>({v:p.id,l:`${p.nome} — ${p.funcao}`}))])}
      ${sel("fd-obra","Obra",S.fDObraId,[{v:"",l:"Selecione..."},...S.obras.map(o=>({v:o.id,l:o.nome}))])}
      ${inp("fd-data","Data",S.fDData,"date")}
      <div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:6px;text-transform:uppercase">Ocorrência</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${OCORR.map(oc=>`<button onclick="S.fDOc='${oc}';rePrest()" style="font-size:12px;padding:6px 12px;border-radius:20px;border:${S.fDOc===oc?"2px solid #F59E0B":"1px solid #E5E7EB"};background:${S.fDOc===oc?"#FEF3C7":"#F9FAFB"};cursor:pointer;font-weight:600">${OC_I[oc]} ${oc}</button>`).join("")}
        </div>
      </div>
      ${inp("fd-obs","Observação",S.fDObs,"text","Ex: Trabalhou na fundação...")}
      ${toggle("Status do pagamento","✅ Pago","⏳ Pendente",S.fDPago!==false,"S.fDPago=true;rePrest()","S.fDPago=false;rePrest()")}
      ${ps&&vp>0?`<div style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:10px;padding:10px;margin-bottom:12px;font-size:13px;color:#065F46;font-weight:700">💰 Será lançado: ${fmt(vp)} nos custos da obra</div>`:""}
      <div style="display:flex;gap:8px">
        <button onclick="S.viewPrest=S.selPrest?'detalhe':'lista';rePrest()" style="flex:1;padding:10px;border-radius:10px;border:1px solid #E5E7EB;background:transparent;color:#6B7280;font-weight:700;cursor:pointer">Cancelar</button>
        <button onclick="salvarDiaria()" style="flex:1;padding:10px;border-radius:10px;border:none;background:#F59E0B;color:#fff;font-weight:700;cursor:pointer">Salvar</button>
      </div>
    </div>
  </div>`;
}

function detalhePrestHTML(){
  const p=S.selPrest;
  const todas=S.diarias.filter(d=>d.prestId===p.id).sort((a,b)=>(b.data||"").localeCompare(a.data||""));
  const mes=S.mes;
  const dmes=todas.filter(d=>d.data?.slice(0,7)===mes);
  const meses=[...new Set(todas.map(d=>d.data?.slice(0,7)).filter(Boolean))].sort().reverse();
  const tPago=todas.filter(d=>d.pago!==false).reduce((a,d)=>a+parseFloat(d.valor||0),0);
  const tPend=todas.filter(d=>d.pago===false).reduce((a,d)=>a+parseFloat(d.valor||0),0);
  const tTrab=todas.filter(d=>d.oc==="Trabalhou").length;
  const tFalt=todas.filter(d=>d.oc==="Falta").length;
  return `<div style="padding-bottom:20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button onclick="S.viewPrest='lista';S.selPrest=null;rePrest()" style="background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:8px 12px;cursor:pointer;font-weight:700;color:#374151">← Voltar</button>
      <div style="flex:1"><div style="font-weight:800;font-size:16px">${p.nome}</div><div style="font-size:12px;color:#6B7280">${p.funcao} · ${fmt(p.diaria)}/dia</div></div>
      <button onclick="S.fDPrestId='${p.id}';S.fDOc='Trabalhou';S.fDPago=true;S.viewPrest='form_diaria';rePrest()" style="background:#F59E0B;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer">+ Diária</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">

window.processarExcel = e => {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!rows.length){S.importErro="Planilha vazia.";reAba();return;}
      const preview=rows.map(r=>{
        const desc=r["Descrição do Gasto"]||r["Descricao do Gasto"]||r["Descrição"]||"";
        const forn=r["Fornecedor / Prestador"]||r["Fornecedor/Prestador"]||r["Fornecedor"]||"";
        const cat=r["Categoria"]||"Material";
        const fase=r["Etapa da Obra"]||r["Etapa"]||"";
        const valorRaw=r["Vlr Total (RS)"]||r["Vlr Total (R$)"]||r["Valor Total"]||r["Valor"]||0;
        const valor=parseFloat(String(valorRaw).replace(/[^\d,.-]/g,"").replace(",","."))||0;
        const dataRaw=r["Data"]||"";
        let data2=today();
        if(dataRaw){
          try{
            if(typeof dataRaw==="number"){const d=new Date(Math.round((dataRaw-25569)*86400*1000));data2=d.toISOString().split("T")[0];}
            else{const parts=String(dataRaw).split(/[/\-]/);if(parts.length===3){data2=parts[2].length===4?`${parts[2]}-${parts[1].padStart(2,"0")}-${parts[0].padStart(2,"0")}`:data2;}}
          }catch{}
        }
        const statusRaw=String(r["Status"]||"").toLowerCase();
        const pago=!statusRaw.includes("pendente");
        return {id:uid(),desc,fornecedor:forn,cat:CATS.includes(cat)?cat:"Material",fase,valor,data:data2,pago};
      }).filter(r=>r.desc&&r.valor>0);
      if(!preview.length){S.importErro="Nenhuma linha válida encontrada.";reAba();return;}
      S.importPreview=preview; S.importErro=""; reAba();
    }catch(err){S.importErro="Erro ao ler o arquivo .xlsx.";reAba();}
  };
  reader.readAsArrayBuffer(file);
  e.target.value="";
};

window.salvarDiaria = async () => {
  const prestId=document.getElementById("fd-prest")?.value||S.fDPrestId||"";
  const obraId=document.getElementById("fd-obra")?.value||S.fDObraId||"";
  const data=document.getElementById("fd-data")?.value||S.fDData||today();

  if(!prestId||!obraId){alert("Selecione o prestador e a obra.");return;}
  const p=S.prestadores.find(x=>x.id===prestId);
  const val=oc==="Trabalhou"?(p?.diaria||0):oc==="Meio período"?(p?.diaria||0)/2:0;
  const nova={id:uid(),prestId,obraId,data,oc,obs,pago,valor:val,pNome:p?.nome||""};
  const diarias=[nova,...S.diarias];
  await fsave("diarias",diarias);
  if(val>0){
    const lista=await fload("custos_"+obraId,[]);
    const nc={id:uid(),desc:`Diária — ${p?.nome}`,cat:"Mão de obra",valor:val,fornecedor:p?.nome||"",data,pago,fase:"Canteiro e despesas gerais"};
    const nl=[nc,...lista];
    await fsave("custos_"+obraId,nl);
    const total=nl.reduce((a,c)=>a+parseFloat(c.valor||0),0);
    const obras=S.obras.map(o=>o.id===obraId?{...o,custoAtual:total}:o);
    await fsave("obras",obras);
    S.obras=obras;
    if(S.obraSel?.id===obraId){S.obraSel={...S.obraSel,custoAtual:total};S.custosList=nl;}
  }
  set({diarias,viewPrest:S.selPrest?"detalhe":"lista",fDPrestId:"",fDObraId:"",fDObs:""});
};

window.togglePagoDiaria = async id => {
  const diarias=S.diarias.map(d=>d.id===id?{...d,pago:d.pago===false?true:false}:d);
  await fsave("diarias",diarias);
  S.diarias=diarias;
  if(S.selPrest) set({diarias,selPrest:S.selPrest});
  else set({diarias});
};

window.deletarDiaria = async id => {
  const diarias=S.diarias.filter(d=>d.id!==id);
  await fsave("diarias",diarias);
  S.diarias=diarias;
  if(S.selPrest) set({diarias,selPrest:S.selPrest});
  else set({diarias});
};

// ── Backup ────────────────────────────────────────────────────────────────────
window.exportarBackup = async () => {
  try {
    const backup = {
      data: new Date().toISOString(),
      versao: "1.0",
      obras: S.obras,
      prestadores: S.prestadores,
      diarias: S.diarias,
      custos: {},
      checklist: {},
      diario: {}
    };
    for(const o of S.obras){
      backup.custos[o.id]    = await fload("custos_"+o.id,[]);
      backup.checklist[o.id] = await fload("check_"+o.id,{});
      backup.diario[o.id]    = await fload("diario_"+o.id,[]);
    }
    const json = JSON.stringify(backup,null,2);
    const blob = new Blob([json],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `habita-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    alert("✅ Backup salvo com sucesso!");
  } catch(e) {
    alert("Erro ao gerar backup: "+e.message);
  }
};

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  const [obras,prest,diarias]=await Promise.all([fload("obras",[]),fload("prestadores",[]),fload("diarias",[])]);
  S.obras=obras; S.prestadores=prest; S.diarias=diarias; S.loading=false;
  render();
}
init();
</script>
