<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Habita"/>
<title>Habita Construtora</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9FAFB;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer}
.page{max-width:640px;margin:0 auto;padding:16px 16px 90px}
.card{background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:16px;margin-bottom:12px}
.btn-primary{background:#F59E0B;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:700;width:100%}
.btn-outline{background:transparent;color:#6B7280;border:1px solid #E5E7EB;border-radius:10px;padding:11px 18px;font-weight:700;width:100%}
.btn-danger{background:#FEE2E2;color:#991B1B;border:none;border-radius:10px;padding:11px 18px;font-weight:700;width:100%}
.btn-sm{padding:7px 14px;font-size:12px}
.inp{width:100%;padding:9px 12px;border:1px solid #E5E7EB;border-radius:10px;outline:none;background:#FAFAFA}
.inp:focus{border-color:#F59E0B}
.label{font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block}
.field{margin-bottom:12px}
.bar-wrap{background:#F3F4F6;border-radius:99px;overflow:hidden}
.bar-fill{border-radius:99px;transition:width .4s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F3F4F6;display:flex;z-index:20}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;border:none;background:transparent;gap:2px}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:700}
.tab-bar{display:flex;background:#F3F4F6;border-radius:12px;padding:4px;margin-bottom:20px;gap:2px}
.tab-btn{flex:1;padding:8px 4px;border-radius:9px;border:none;font-weight:700;font-size:12px;cursor:pointer}
.status-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;white-space:nowrap}
.pago-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;border:none;cursor:pointer}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;font-weight:600}
.toggle-row{display:flex;gap:8px;margin-bottom:12px}
.toggle-btn{flex:1;padding:9px 0;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header" style="background:#fff;border-bottom:1px solid #F3F4F6;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9">
  <div style="display:flex;align-items:center;gap:8px">
    <svg width="36" height="36" viewBox="0 0 80 80"><rect x="6" y="8" width="11" height="64" fill="#5a6475" rx="2"/><rect x="6" y="34" width="34" height="10" fill="#5a6475" rx="2"/><rect x="32" y="8" width="28" height="8" fill="#c0431a" rx="1"/><rect x="32" y="18" width="28" height="7" fill="#d4541f" rx="1"/><rect x="32" y="27" width="28" height="7" fill="#c0431a" rx="1"/><rect x="32" y="36" width="28" height="7" fill="#d4541f" rx="1"/><rect x="32" y="45" width="28" height="7" fill="#c0431a" rx="1"/><rect x="32" y="54" width="28" height="8" fill="#d4541f" rx="1"/><rect x="32" y="62" width="28" height="10" fill="#c0431a" rx="1"/></svg>
    <div><div style="font-weight:900;font-size:15px;color:#3d4450;letter-spacing:1px;line-height:1">HABITA</div><div style="font-weight:600;font-size:9px;color:#5a6475;letter-spacing:3px;line-height:1;margin-top:2px">CONSTRUTORA</div></div>
  </div>
  <button id="btn-backup" class="btn-outline btn-sm" style="width:auto">💾 Backup</button>
</div>

<!-- MAIN -->
<div class="page" id="main-content"></div>

<!-- NAV -->
<nav class="nav-bar" id="nav-bar"></nav>

<!-- MODAIS -->
<div id="modal-obra" style="display:none" class="modal-overlay"></div>
<div id="modal-confirm" style="display:none" class="modal-overlay"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase ──────────────────────────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey:"AIzaSyCKjp2T1SL7qF5UfuwJkT5dRQ2a2KW-oSY",
  authDomain:"habita-construtora.firebaseapp.com",
  projectId:"habita-construtora",
  storageBucket:"habita-construtora.firebasestorage.app",
  messagingSenderId:"245327126652",
  appId:"1:245327126652:web:dd4092f35f295b6151e9f9"
});
const db = getFirestore(fbApp);
const UID = "augusto";

async function dbSave(key, data) {
  await setDoc(doc(db, UID, key), { value: JSON.stringify(data) });
}
async function dbLoad(key, fallback) {
  try {
    const snap = await getDoc(doc(db, UID, key));
    return snap.exists() ? JSON.parse(snap.data().value) : fallback;
  } catch { return fallback; }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const uid    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const toDay  = () => new Date().toISOString().split("T")[0];
const fmtBRL = v  => parseFloat(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtDt  = d  => { try { return new Date(d+"T12:00").toLocaleDateString("pt-BR"); } catch { return d||""; } };
const qs     = id => document.getElementById(id);
const val    = id => { const el=qs(id); return el ? el.value : ""; };
const setHTML= (id,h) => { const el=qs(id); if(el) el.innerHTML=h; };

// ── Constantes ────────────────────────────────────────────────────────────────
const STATUS   = ["Planejamento","Em andamento","Pausada","Atrasada","Finalizada"];
const ST_COLOR = {"Em andamento":["#FEF3C7","#92400E"],"Planejamento":["#DBEAFE","#1E40AF"],"Atrasada":["#FEE2E2","#991B1B"],"Finalizada":["#D1FAE5","#065F46"],"Pausada":["#F3F4F6","#374151"]};
const CATS     = ["Material","Mão de obra","Frete","Equipamentos","Alimentação","Outros"];
const CAT_IC   = {Material:"🧱","Mão de obra":"👷",Frete:"🚚",Equipamentos:"🔧",Alimentação:"🍱",Outros:"📦"};
const FUNCOES  = ["Pedreiro","Servente","Eletricista","Encanador","Pintor","Carpinteiro","Armador","Mestre de Obras","Outros"];
const PERIODOS = ["Semanal","Quinzenal","Mensal"];
const OCORR    = ["Trabalhou","Falta","Feriado","Chuva — sem serviço","Meio período","Atestado"];
const OC_C     = {"Trabalhou":"#059669","Falta":"#DC2626","Feriado":"#6366F1","Chuva — sem serviço":"#3B82F6","Meio período":"#F59E0B","Atestado":"#9CA3AF"};
const OC_I     = {"Trabalhou":"✅","Falta":"❌","Feriado":"🏖️","Chuva — sem serviço":"🌧️","Meio período":"⏱️","Atestado":"🏥"};
const CLIMAS   = ["☀️ Ensolarado","🌥️ Nublado","🌧️ Chuva fraca","⛈️ Chuva forte","🌬️ Ventoso"];
const FASES    = [
  {id:1,nome:"Adequações de terreno",pct:null},
  {id:2,nome:"Canteiro e despesas gerais",pct:0.015},
  {id:3,nome:"Serviços preliminares",pct:0.010},
  {id:4,nome:"Fundação",pct:0.060},
  {id:5,nome:"Estrutura",pct:0.160},
  {id:6,nome:"Alvenaria",pct:0.030},
  {id:7,nome:"Revestimentos argamassados",pct:0.030},
  {id:8,nome:"Instalações elétricas",pct:0.025},
  {id:9,nome:"Instalações hidráulicas",pct:0.015},
  {id:10,nome:"Instalações especiais",pct:0.010},
  {id:11,nome:"Impermeabilizações",pct:0.030},
  {id:12,nome:"Acabamentos",pct:0.180},
  {id:13,nome:"Cobertura",pct:0.030},
  {id:14,nome:"Esquadrias e vidros",pct:0.150},
  {id:15,nome:"Decoração e luminotécnica",pct:0.060},
  {id:16,nome:"Marmoraria, Louças e Metais",pct:0.060},
  {id:17,nome:"Forros",pct:0.030},
  {id:18,nome:"Pintura interna e externa",pct:0.030},
  {id:19,nome:"Pavimentações e área verde",pct:0.010},
  {id:20,nome:"Finalização",pct:0.010},
];
const ETAPAS_CK = [
  {id:"fundacao",nome:"Fundação",icon:"⛏️",itens:["Locação da obra conferida","Escavação no nível correto","Formas conferidas e alinhadas","Armação conforme projeto","Cobrimento mínimo do concreto","Limpeza do fundo da vala","Adensamento do concreto","Cura do concreto executada"]},
  {id:"estrutura",nome:"Estrutura",icon:"🏗️",itens:["Escoramento adequado","Armação de pilares conferida","Armação de vigas conferida","Prumo dos pilares verificado","Nível das vigas verificado","Posição das janelas marcada","Caixas elétricas embutidas antes da concretagem","Cura realizada corretamente"]},
  {id:"alvenaria",nome:"Alvenaria",icon:"🧱",itens:["Prumo das paredes verificado","Nível das fiadas conferido","Espessura das juntas","Vergas e contravergas executadas","Amarração nos pilares","Respingos removidos","Proteção das paredes durante chuva"]},
  {id:"eletrica",nome:"Elétrica",icon:"⚡",itens:["Altura das tomadas conferida","Conduítes passados corretamente","Quadro elétrico dimensionado","Aterramento executado","Pontos de ar condicionado previstos","Alimentação para coifa","Circuito para lava louça","Ponto para forno elétrico","Circuito dedicado para geladeira","Pontos de internet","CFTV previsto","Campainha prevista"]},
  {id:"hidraulica",nome:"Hidráulica",icon:"💧",itens:["Caimento das tubulações correto","Pontos de água fria conferidos","Pontos de água quente conferidos","Tipo de torneiras definido","Ponto lava louça: hidráulica e esgoto","Caixa d'água dimensionada","Teste de estanqueidade realizado","Instalação de gás com ART"]},
  {id:"cobertura",nome:"Cobertura",icon:"🏠",itens:["Estrutura conferida","Caimento mínimo das telhas","Cumeeira vedada","Rufo e contra-rufo executados","Calhas e coletores instalados","Impermeabilização de lajes","Telhado fixado corretamente"]},
  {id:"acabamento",nome:"Acabamento",icon:"✨",itens:["Emboço nivelado","Reboco executado","Azulejos com caimento correto","Rodapés alinhados","Pintura adequada","Portas e janelas reguladas","Bancadas e marmoraria niveladas","Louças e metais instalados","Limpeza final executada"]},
];
const TOTAL_CK = ETAPAS_CK.reduce((a,e)=>a+e.itens.length,0);

// ── Estado ────────────────────────────────────────────────────────────────────
const APP = {
  page: "dashboard",
  obras: [], prestadores: [], diarias: [],
  obraAtual: null, abaAtual: "visao",
  checkData: {}, etapaAtual: null,
  diarioList: [], diarioForm: false, dClima: CLIMAS[0],
  custosList: [], custoForm: false, custoImport: false,
  custoCat: "Material", custoPago: true, importPreview: [],
  prestView: "lista", prestAtual: null, prestMes: toDay().slice(0,7),
  diariaOc: "Trabalhou", diariaPago: true,
};
window.APP = APP;

// ── Render ────────────────────────────────────────────────────────────────────
function renderPage() {
  renderNav();
  switch(APP.page) {
    case "dashboard":   renderDashboard(); break;
    case "obras":       renderObras(); break;
    case "obra_det":    renderObraDetalhe(); break;
    case "equipe":      renderEquipe(); break;
    case "sel_obra":    renderSelObra(); break;
  }
}

function bar(pct, color="#F59E0B", h=6) {
  return `<div class="bar-wrap" style="height:${h}px"><div class="bar-fill" style="width:${Math.min(pct||0,100)}%;height:${h}px;background:${color}"></div></div>`;
}
function badge(s) {
  const [bg,cl] = ST_COLOR[s]||["#F3F4F6","#374151"];
  return `<span class="status-badge" style="background:${bg};color:${cl}">${s}</span>`;
}
function pagoBadge(pago, onclick) {
  return `<button class="pago-badge" onclick="${onclick}" style="background:${pago!==false?"#D1FAE5":"#FEF3C7"};color:${pago!==false?"#065F46":"#92400E"}">${pago!==false?"✅ Pago":"⏳ Pendente"}</button>`;
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function renderNav() {
  const items = [
    {id:"dashboard",icon:"📊",label:"Dashboard"},
    {id:"obras",icon:"🏗️",label:"Obras"},
    {id:"equipe",icon:"👷",label:"Equipe"},
    {id:"checklist",icon:"✅",label:"Checklist"},
    {id:"custos",icon:"💰",label:"Custos"},
  ];
  setHTML("nav-bar", items.map(n => {
    const active = APP.page===n.id || (APP.page==="obra_det"&&n.id==="obras");
    return `<button class="nav-btn" onclick="navTo('${n.id}')">
      <span class="nav-icon">${n.icon}</span>
      <span class="nav-label" style="color:${active?"#F59E0B":"#9CA3AF"}">${n.label}</span>
      ${active?`<div style="width:4px;height:4px;border-radius:50%;background:#F59E0B"></div>`:""}
    </button>`;
  }).join(""));
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const obras = APP.obras;
  const at = obras.filter(o=>o.status==="Em andamento").length;
  const fi = obras.filter(o=>o.status==="Finalizada").length;
  const al = obras.filter(o=>o.status==="Atrasada").length;
  const ct = obras.reduce((a,o)=>a+(o.custoAtual||0),0);
  const ativas = obras.filter(o=>o.status!=="Finalizada").slice(0,5);

  setHTML("main-content", `
    <div style="margin-bottom:16px">
      <div style="font-weight:900;font-size:20px;color:#1F2937">Visão Geral</div>
      <div style="font-size:12px;color:#9CA3AF">${new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      ${[["🔨","Em andamento",at,"#F59E0B"],["✅","Concluídas",fi,"#059669"],["⚠️","Atrasadas",al,"#DC2626"],["💰","Custo total",fmtBRL(ct),"#374151"]].map(([ic,lb,v,c])=>`
        <div class="card" style="margin-bottom:0">
          <span style="font-size:22px">${ic}</span>
          <div style="font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase;margin-top:4px">${lb}</div>
          <div style="font-size:20px;font-weight:900;color:${c}">${v}</div>
        </div>`).join("")}
    </div>
    ${al>0?`<div class="card" style="background:#FFF5F5;border-color:#FCA5A5;display:flex;gap:10px;align-items:center">
      <span style="font-size:20px">🚨</span>
      <div style="font-weight:700;color:#DC2626;font-size:13px">${al} obra(s) atrasada(s) — verifique os prazos</div>
    </div>`:""}
    ${obras.length===0?`<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:12px">🏗️</div>
      <div style="font-weight:800;font-size:17px;color:#374151;margin-bottom:6px">Bem-vindo à Habita!</div>
      <div style="font-size:14px;color:#6B7280">Vá em <b>Obras</b> e adicione sua primeira obra.</div>
    </div>`:`<div class="card">
      <div style="font-weight:700;font-size:12px;color:#6B7280;text-transform:uppercase;margin-bottom:12px">Andamento das obras</div>
      ${ativas.map(o=>`
        <div style="margin-bottom:12px;cursor:pointer" onclick="abrirObra('${o.id}')">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:700;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">${o.nome}</span>
            <span style="font-size:12px;font-weight:800;color:#F59E0B">${o.progresso||0}%</span>
          </div>
          ${bar(o.progresso||0,o.status==="Atrasada"?"#F87171":"#F59E0B")}
        </div>`).join("")}
    </div>`}
  `);
}

// ── Obras ─────────────────────────────────────────────────────────────────────
function renderObras() {
  const busca = APP.buscaObra||"";
  const filtro = APP.filtroObra||"Todas";
  const list = APP.obras.filter(o => {
    const m = !busca || o.nome.toLowerCase().includes(busca.toLowerCase()) || o.cliente.toLowerCase().includes(busca.toLowerCase());
    return m && (filtro==="Todas" || o.status===filtro);
  });

  setHTML("main-content", `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:800;font-size:20px;color:#1F2937">Obras</div>
      <button class="btn-primary btn-sm" style="width:auto" onclick="abrirFormObra()">+ Nova obra</button>
    </div>
    <input class="inp" value="${busca}" oninput="APP.buscaObra=this.value;renderObras()" placeholder="🔍 Buscar obra ou cliente..." style="margin-bottom:12px;display:block"/>
    <div class="chips" style="margin-bottom:16px">
      ${["Todas",...STATUS].map(f=>`<button class="chip" onclick="APP.filtroObra='${f}';renderObras()" style="border:${filtro===f?"none":"1px solid #E5E7EB"};background:${filtro===f?"#F59E0B":"#fff"};color:${filtro===f?"#fff":"#6B7280"}">${f}</button>`).join("")}
    </div>
    ${list.length===0?`<div style="text-align:center;padding:40px;color:#9CA3AF">Nenhuma obra encontrada.</div>`:""}
    ${list.map(o => cardObra(o)).join("")}
  `);
}

function cardObra(o) {
  const prev = parseFloat(o.valorPrevisto)||0;
  const custo = o.custoAtual||0;
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1;cursor:pointer" onclick="abrirObra('${o.id}')">
        <span style="font-size:28px">${o.thumb||"🏠"}</span>
        <div style="min-width:0">
          <div style="font-weight:800;font-size:15px;color:#1F2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.nome}</div>
          <div style="font-size:12px;color:#6B7280">${o.cliente}</div>
          ${o.endereco?`<div style="font-size:11px;color:#9CA3AF;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📍 ${o.endereco}</div>`:""}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        ${badge(o.status)}
        <div style="display:flex;gap:4px">
          <button onclick="abrirEditObra('${o.id}')" style="background:transparent;border:none;font-size:16px;cursor:pointer">✏️</button>
          ${o.status!=="Finalizada"?`<button onclick="concluirObra('${o.id}')" style="background:transparent;border:none;font-size:16px;cursor:pointer">✅</button>`:""}
          <button onclick="confirmarDeletar('obra','${o.id}','${o.nome.replace(/'/g,"\\'")}') " style="background:transparent;border:none;font-size:16px;cursor:pointer">🗑️</button>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:12px;color:#6B7280;font-weight:600">Progresso</span>
      <span style="font-size:12px;font-weight:800;color:#F59E0B">${o.progresso||0}%</span>
    </div>
    ${bar(o.progresso||0,o.status==="Atrasada"?"#F87171":"#F59E0B")}
    ${prev>0?`<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#9CA3AF">
      <span>Previsto: <b style="color:#374151">${fmtBRL(prev)}</b></span>
      <span>Custo: <b style="color:#F59E0B">${fmtBRL(custo)}</b></span>
    </div>`:""}
    ${o.prazo?`<div style="font-size:11px;color:#9CA3AF;margin-top:4px">📅 ${fmtDt(o.prazo)}</div>`:""}
  </div>`;
}

// ── Form Obra (Modal) ─────────────────────────────────────────────────────────
function abrirFormObra(obra) {
  const THUMBS = ["🏠","🏢","🏡","🏗️","🏖️","🏬","🏭","🏛️"];
  const o = obra || {thumb:"🏠",status:"Planejamento"};
  APP.formObraThumb = o.thumb||"🏠";

  const modal = qs("modal-obra");
  modal.style.display = "flex";
  modal.innerHTML = `
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">

window.selecionarThumb = t => {
  APP.formObraThumb = t;
  document.querySelectorAll("[id^='thumb-']").forEach(btn => {
    const bt = btn.id.replace("thumb-","");
    btn.style.border = bt===t ? "2px solid #F59E0B" : "1px solid #E5E7EB";
    btn.style.background = bt===t ? "#FEF3C7" : "#F9FAFB";
  });
};

window.fecharFormObra = () => { qs("modal-obra").style.display="none"; };

async function salvarObra() {
  const nome   = val("fo-nome").trim();
  const cliente= val("fo-cliente").trim();
  if(!nome||!cliente) { alert("Preencha nome e cliente."); return; }
  const id = val("fo-id");
  const novo = {
    nome, cliente,
    endereco: val("fo-end"),
    status: val("fo-status"),
    prazo: val("fo-prazo"),
    valorPrevisto: val("fo-valor"),
    thumb: APP.formObraThumb||"🏠",
  };
  let obras = [...APP.obras];
  if(id) {
    obras = obras.map(o => o.id===id ? {...o,...novo} : o);
    if(APP.obraAtual?.id===id) APP.obraAtual = {...APP.obraAtual,...novo};
  } else {
    obras = [{...novo, id:uid(), custoAtual:0, progresso:0}, ...obras];
  }
  await dbSave("obras", obras);
  APP.obras = obras;
  fecharFormObra();
  APP.page==="obra_det" ? renderObraDetalhe() : renderObras();
}

window.abrirFormObra = () => abrirFormObra(null);
window.abrirEditObra = id => abrirFormObra(APP.obras.find(o=>o.id===id));

window.concluirObra = async id => {
  APP.obras = APP.obras.map(o => o.id===id ? {...o,status:"Finalizada",progresso:100} : o);
  await dbSave("obras", APP.obras);
  renderObras();
};

window.confirmarDeletar = (tipo, id, nome) => {
  const modal = qs("modal-confirm");
  modal.style.display = "flex";
  modal.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()" style="text-align:center;padding:32px">
    <div style="font-size:36px;margin-bottom:12px">⚠️</div>
    <div style="font-weight:700;font-size:15px;color:#374151;margin-bottom:20px">Apagar "${nome}"?</div>
    <div style="display:flex;gap:10px">
      <button class="btn-outline" onclick="qs('modal-confirm').style.display='none'">Cancelar</button>
      <button class="btn-danger" onclick="executarDeletar('${tipo}','${id}')">Confirmar</button>
    </div>
  </div>`;
};

window.executarDeletar = async (tipo, id) => {
  qs("modal-confirm").style.display = "none";
  if(tipo==="obra") {
    APP.obras = APP.obras.filter(o=>o.id!==id);
    await dbSave("obras", APP.obras);
    APP.page = "obras"; renderPage();
  } else if(tipo==="prest") {
    APP.prestadores = APP.prestadores.filter(p=>p.id!==id);
    await dbSave("prestadores", APP.prestadores);
    APP.prestView="lista"; APP.prestAtual=null; renderEquipe();
  } else if(tipo==="custo") {
    APP.custosList = APP.custosList.filter(c=>c.id!==id);
    await dbSave("custos_"+APP.obraAtual.id, APP.custosList);
    const total = APP.custosList.reduce((a,c)=>a+parseFloat(c.valor||0),0);
    APP.obras = APP.obras.map(o=>o.id===APP.obraAtual.id?{...o,custoAtual:total}:o);
    APP.obraAtual = {...APP.obraAtual, custoAtual:total};
    await dbSave("obras", APP.obras);
    renderAbaCustos();
  } else if(tipo==="diario") {
    APP.diarioList = APP.diarioList.filter(e=>e.id!==id);
    await dbSave("diario_"+APP.obraAtual.id, APP.diarioList);
    renderAbaDiario();
  } else if(tipo==="diaria") {
    APP.diarias = APP.diarias.filter(d=>d.id!==id);
    await dbSave("diarias", APP.diarias);
    renderEquipe();
  }
};

// ── Obra Detalhe ──────────────────────────────────────────────────────────────
async function abrirObra(id) {
  const obra = APP.obras.find(o=>o.id===id);
  if(!obra) return;
  APP.obraAtual = obra;
  APP.abaAtual = "visao";
  APP.etapaAtual = null;
  APP.page = "obra_det";
  const [ck,di,cu] = await Promise.all([
    dbLoad("check_"+id,{}),
    dbLoad("diario_"+id,[]),
    dbLoad("custos_"+id,[]),
  ]);
  APP.checkData   = ck;
  APP.diarioList  = di;
  APP.custosList  = cu;
  APP.diarioForm  = false;
  APP.custoForm   = false;
  APP.custoImport = false;
  renderObraDetalhe();
}
window.abrirObra = abrirObra;

function renderObraDetalhe() {
  renderNav();
  const o = APP.obraAtual;
  const tabs = [{id:"visao",l:"📊 Visão"},{id:"checklist",l:"✅ Checklist"},{id:"diario",l:"📝 Diário"},{id:"custos",l:"💰 Custos"}];
  setHTML("main-content", `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="btn-outline btn-sm" style="width:auto" onclick="APP.page='obras';renderPage()">← Voltar</button>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:16px;color:#1F2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.nome}</div>
        <div style="font-size:12px;color:#6B7280">${o.cliente}</div>
      </div>
      ${badge(o.status)}
      <button class="btn-outline btn-sm" style="width:auto" id="btn-edit-obra-det">✏️</button>
    </div>
    <div class="tab-bar" id="tab-bar-obra">
      ${tabs.map(t=>`<button class="tab-btn" id="tab-${t.id}" style="background:${APP.abaAtual===t.id?"#fff":"transparent"};color:${APP.abaAtual===t.id?"#F59E0B":"#6B7280"}">${t.l}</button>`).join("")}
    </div>
    <div id="aba-content"></div>
  `);
  renderAbaAtual();

  // Eventos das abas — usando addEventListener após renderizar
  const tabIds = ["visao","checklist","diario","custos"];
  tabIds.forEach(id => {
    const btn = qs(`tab-${id}`);
    if(btn) btn.addEventListener("click", () => mudarAba(id));
  });

  // Evento botão editar obra no detalhe
  const btnEdit = qs("btn-edit-obra-det");
  if(btnEdit) btnEdit.addEventListener("click", () => abrirEditObra(o.id));
}

function renderAbaAtual() {
  switch(APP.abaAtual) {
    case "visao":     renderAbaVisao(); break;
    case "checklist": renderAbaCheck(); break;
    case "diario":    renderAbaDiario(); break;
    case "custos":    renderAbaCustos(); break;
  }
}

async function mudarAba(aba) {
  APP.abaAtual = aba;
  APP.etapaAtual = null;
  const id = APP.obraAtual.id;
  if(aba==="checklist") APP.checkData  = await dbLoad("check_"+id,{});
  if(aba==="diario")    { APP.diarioList = await dbLoad("diario_"+id,[]); APP.diarioForm=false; }
  if(aba==="custos")    { APP.custosList = await dbLoad("custos_"+id,[]); APP.custoForm=false; APP.custoImport=false; }
  // Atualizar estilo das abas
  ["visao","checklist","diario","custos"].forEach(tid => {
    const btn = qs(`tab-${tid}`);
    if(btn) {
      btn.style.background = tid===aba ? "#fff" : "transparent";
      btn.style.color = tid===aba ? "#F59E0B" : "#6B7280";
    }
  });
  renderAbaAtual();
}
window.mudarAba = mudarAba;

function renderAbaCheck() {
  const ck = APP.checkData||{};
  if(APP.etapaAtual) {
    const etapa = ETAPAS_CK.find(e=>e.id===APP.etapaAtual);
    const eApr  = etapa.itens.filter(it=>ck[`${etapa.id}_${it}`]==="ok").length;
    setHTML("aba-content",`
      <button onclick="APP.etapaAtual=null;renderAbaCheck()" style="color:#F59E0B;font-weight:700;background:none;border:none;cursor:pointer;margin-bottom:16px;padding:0">← Voltar às etapas</button>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:22px">${etapa.icon}</span><span style="font-weight:800;font-size:16px">${etapa.nome}</span></div>
        ${bar(Math.round(eApr/etapa.itens.length*100))}

      </div>
      <div id="check-itens"></div>
    `);
    setHTML("check-itens", etapa.itens.map(item => {
      const k=`${etapa.id}_${item}`, st=ck[k];
      const esc = encodeURIComponent(item);
      return `<div class="card" style="background:${st==="ok"?"#F0FDF4":st==="nok"?"#FFF5F5":"#fff"};border-color:${st==="ok"?"#A7F3D0":st==="nok"?"#FCA5A5":"#F3F4F6"}">
        <div style="font-weight:600;font-size:14px;color:#374151;margin-bottom:10px">${item}</div>
        <div style="display:flex;gap:8px">
          <button onclick="setCheck('${etapa.id}','${esc}','ok')" style="flex:1;padding:8px 0;border-radius:10px;border:none;background:${st==="ok"?"#059669":"#F3F4F6"};color:${st==="ok"?"#fff":"#6B7280"};font-weight:700;cursor:pointer">✅ Aprovar</button>
          <button onclick="setCheck('${etapa.id}','${esc}','nok')" style="flex:1;padding:8px 0;border-radius:10px;border:none;background:${st==="nok"?"#DC2626":"#F3F4F6"};color:${st==="nok"?"#fff":"#6B7280"};font-weight:700;cursor:pointer">❌ Reprovar</button>
          ${st?`<button onclick="setCheck('${etapa.id}','${esc}',null)" style="padding:8px 12px;border-radius:10px;border:none;background:#F3F4F6;color:#6B7280;font-weight:700;cursor:pointer">↩</button>`:""}
        </div>
      </div>`;
    }).join(""));
    return;
  }
  const apr=Object.values(ck).filter(v=>v==="ok").length;
  const rep=Object.values(ck).filter(v=>v==="nok").length;
  setHTML("aba-content",`
    <div class="card">
      <div style="font-weight:700;font-size:12px;color:#6B7280;text-transform:uppercase;margin-bottom:10px">Progresso geral</div>
      <div style="display:flex;margin-bottom:10px">
        ${[["✅",apr,"Aprovados","#059669"],["❌",rep,"Reprovados","#DC2626"],["⏳",TOTAL_CK-apr-rep,"Pendentes","#9CA3AF"]].map(([ic,n,lb,c])=>`<div style="flex:1;text-align:center"><div style="font-size:22px;font-weight:900;color:${c}">${n}</div><div style="font-size:11px;color:#9CA3AF">${lb}</div></div>`).join("")}
      </div>
      ${bar(Math.round(apr/TOTAL_CK*100),6,"#059669")}
      <div style="font-size:11px;text-align:right;color:#059669;font-weight:700;margin-top:4px">${Math.round(apr/TOTAL_CK*100)}% — atualiza o progresso da obra automaticamente</div>
    </div>
    <div id="etapas-lista"></div>
  `);
  setHTML("etapas-lista", ETAPAS_CK.map(etapa => {
      const a=etapa.itens.filter(it=>ck[`${etapa.id}_${it}`]==="ok").length;
      const r=etapa.itens.filter(it=>ck[`${etapa.id}_${it}`]==="nok").length;
      return `<div class="card" id="etapa-card-${etapa.id}" style="cursor:pointer">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${etapa.icon}</span><span style="font-weight:700;font-size:15px">${etapa.nome}</span></div>
          <div style="display:flex;align-items:center;gap:6px">
            ${r>0?`<span style="font-size:11px;background:#FEE2E2;color:#991B1B;font-weight:700;padding:2px 8px;border-radius:10px">${r}⚠️</span>`:""}
            <span style="font-size:13px;font-weight:800;color:#F59E0B">${Math.round(a/etapa.itens.length*100)}%</span>›
          </div>
        </div>
        ${bar(Math.round(a/etapa.itens.length*100),6,r>0?"#F87171":"#F59E0B")}
        <div style="font-size:11px;color:#9CA3AF;margin-top:4px">${a}/${etapa.itens.length} itens</div>
      </div>`;
    }).join(""));
  ETAPAS_CK.forEach(etapa => {
    const card = qs(`etapa-card-${etapa.id}`);
    if(card) card.addEventListener("click", () => { APP.etapaAtual = etapa.id; renderAbaCheck(); });
  });
  return;
}

async function salvarDiario() {
  const servicos = (qs("d-servicos")?.value||"").trim();
  if(!servicos) { alert("Informe os serviços executados."); return; }
  const nova = {
    id: uid(), data: toDay(),
    hora: new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    clima: APP.dClima,
    equipe: qs("d-equipe")?.value||"",
    servicos,
    obs: qs("d-obs")?.value||"",
  };
  APP.diarioList = [nova, ...APP.diarioList];
  await dbSave("diario_"+APP.obraAtual.id, APP.diarioList);
  APP.diarioForm = false;
  renderAbaDiario();
}

// ── Aba Custos ────────────────────────────────────────────────────────────────
function renderAbaCustos() {
  const o=APP.obraAtual, custos=APP.custosList||[];
  const prev=parseFloat(o.valorPrevisto)||0;
  const total=custos.reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tPago=custos.filter(c=>c.pago!==false).reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tPend=custos.filter(c=>c.pago===false).reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tMO=custos.filter(c=>c.cat==="Mão de obra").reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tMat=custos.filter(c=>c.cat==="Material").reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const tOut=custos.filter(c=>c.cat!=="Mão de obra"&&c.cat!=="Material").reduce((a,c)=>a+parseFloat(c.valor||0),0);
  const pMO=prev>0?Math.round(tMO/prev*100):0;
  const pMat=prev>0?Math.round(tMat/prev*100):0;
  const pOut=prev>0?Math.round(tOut/prev*100):0;

window.processarExcel = e => {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
      if(!rows.length){setHTML("import-erro","Planilha vazia.");return;}
      const preview=rows.map(r=>{
        const desc=r["Descrição do Gasto"]||r["Descricao do Gasto"]||r["Descrição"]||"";
        const forn=r["Fornecedor / Prestador"]||r["Fornecedor/Prestador"]||r["Fornecedor"]||"";
        const cat=r["Categoria"]||"Material";
        const fase=r["Etapa da Obra"]||r["Etapa"]||"";
        const vr=r["Vlr Total (RS)"]||r["Vlr Total (R$)"]||r["Valor Total"]||r["Valor"]||0;
        const valor=parseFloat(String(vr).replace(/[^\d,.-]/g,"").replace(",","."))||0;
        const dr=r["Data"]||"";
        let data=toDay();
        if(dr){try{if(typeof dr==="number"){const d=new Date(Math.round((dr-25569)*86400*1000));data=d.toISOString().split("T")[0];}else{const p=String(dr).split(/[/\-]/);if(p.length===3&&p[2].length===4)data=`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;}}catch{}}
        const pago=!String(r["Status"]||"").toLowerCase().includes("pendente");
        return {id:uid(),desc,fornecedor:forn,cat:CATS.includes(cat)?cat:"Material",fase,valor,data,pago};
      }).filter(r=>r.desc&&r.valor>0);
      if(!preview.length){setHTML("import-erro","Nenhuma linha válida encontrada.");return;}
      APP.importPreview=preview;
      setHTML("import-preview",`<div style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:10px;padding:10px;margin-bottom:8px"><b style="color:#065F46">${preview.length} lançamentos encontrados</b><div style="font-size:11px;color:#059669">Total: ${fmtBRL(preview.reduce((a,c)=>a+c.valor,0))}</div></div>`);
      setHTML("import-erro","");
      const btn=qs("btn-confirmar-import");
      if(btn){btn.style.display="block";btn.addEventListener("click",confirmarImport);}
    }catch{setHTML("import-erro","Erro ao ler o arquivo.");}
  };
  reader.readAsArrayBuffer(file);
  e.target.value="";
};
async function confirmarImport() {
  const novos=APP.importPreview||[]; if(!novos.length) return;
  APP.custosList=[...novos,...APP.custosList];
  await dbSave("custos_"+APP.obraAtual.id, APP.custosList);
  const total=APP.custosList.reduce((a,c)=>a+parseFloat(c.valor||0),0);
  APP.obras=APP.obras.map(o=>o.id===APP.obraAtual.id?{...o,custoAtual:total}:o);
  APP.obraAtual={...APP.obraAtual,custoAtual:total};
  await dbSave("obras",APP.obras);
  APP.custoImport=false; APP.importPreview=[];
  setHTML("custo-import-area","");

}

function calcFechamento(p, diarias, mes) {
  const dmes = diarias.filter(d=>d.prestId===p.id&&d.data?.slice(0,7)===mes);
  const diasTrab = dmes.filter(d=>d.oc==="Trabalhou").length;
  const diasMeio = dmes.filter(d=>d.oc==="Meio período").length;
  const totalBruto = (diasTrab*(p.diaria||0)) + (diasMeio*(p.diaria||0)/2);
  const totalAdt = dmes.filter(d=>d.tipo==="adiantamento").reduce((a,d)=>a+parseFloat(d.valor||0),0);
  const totalPgDiaria = dmes.filter(d=>d.pago!==false&&!d.tipo&&d.valor>0).reduce((a,d)=>a+parseFloat(d.valor||0),0);
  const saldo = totalBruto - totalAdt - totalPgDiaria;
  return { diasTrab, diasMeio, totalBruto, totalAdt, totalPgDiaria, saldo };
}

        <div style="background:#fff;border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:10px;color:#9CA3AF;font-weight:700">👷 PRESTADORES</div>
          <div style="font-weight:900;font-size:16px;color:#374151">${prest.length}</div>
        </div>
      </div>
    </div>

    <!-- Cards por prestador com fechamento -->
    ${prest.length===0?`<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">👷</div><div style="font-weight:800;font-size:16px;color:#374151;margin-bottom:16px">Nenhum prestador cadastrado</div><button class="btn-primary" id="btn-add-prest-empty">+ Adicionar prestador</button></div>`:""}
    <div id="lista-prest"></div>
  `);

  qs("btn-novo-prest")?.addEventListener("click", () => { APP.prestView="form_prest"; renderEquipe(); });
  qs("btn-nova-diaria")?.addEventListener("click", () => { APP.diariaOc="Trabalhou"; APP.diariaPago=true; APP.prestView="form_diaria"; renderEquipe(); });
  qs("btn-add-prest-empty")?.addEventListener("click", () => { APP.prestView="form_prest"; renderEquipe(); });

  setHTML("lista-prest", prest.map(p => {
    const dmes=diarias.filter(d=>d.prestId===p.id&&d.data?.slice(0,7)===mes);
    const trab=dmes.filter(d=>d.oc==="Trabalhou").length;
    const falt=dmes.filter(d=>d.oc==="Falta").length;
    const pgM=dmes.filter(d=>d.pago!==false).reduce((a,d)=>a+parseFloat(d.valor||0),0);
    const pdM=dmes.filter(d=>d.pago===false).reduce((a,d)=>a+parseFloat(d.valor||0),0);
    return `<div class="card" id="prest-card-${p.id}" style="cursor:pointer">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:44px;height:44px;border-radius:50%;background:#FEF3C7;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">👷</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nome}</div>
          <div style="font-size:12px;color:#6B7280">${p.funcao} · <span style="color:#F59E0B;font-weight:700">${fmtBRL(p.diaria)}/dia</span></div>
        </div>
        <div style="display:flex;gap:4px;align-items:center">
          <button id="del-prest-${p.id}" style="background:transparent;border:none;cursor:pointer;font-size:16px;padding:2px">🗑️</button>
          <span style="color:#D1D5DB">›</span>
        </div>
      </div>
      <div style="background:#F9FAFB;border-radius:10px;padding:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:12px;color:#6B7280"><span style="margin-right:10px">✅ <b>${trab}</b></span><span>❌ <b>${falt}</b></span></div>
          <div style="text-align:right">
            ${pgM>0?`<div style="font-weight:900;font-size:13px;color:#059669">${fmtBRL(pgM)} pago</div>`:""}
            ${pdM>0?`<div style="font-weight:700;font-size:12px;color:#F59E0B">${fmtBRL(pdM)} pendente</div>`:""}
          </div>
        </div>
      </div>
    </div>`;
  }).join(""));

  // Eventos dos cards de prestador (addEventListener para não ter problema com onclick inline)
  prest.forEach(p => {
    const card = qs(`prest-card-${p.id}`);
    const delBtn = qs(`del-prest-${p.id}`);
    if(card) card.addEventListener("click", () => { APP.prestAtual=p; APP.prestView="detalhe"; renderEquipe(); });
    if(delBtn) delBtn.addEventListener("click", e => { e.stopPropagation(); confirmarDeletar("prest",p.id,p.nome); });
  });
}

function renderFormDiaria() {
  setHTML("main-content",`
    <button class="btn-outline btn-sm" style="width:auto;margin-bottom:16px" id="btn-voltar-diaria">← Voltar</button>
    <div class="card">
      <div style="font-weight:800;font-size:16px;color:#1F2937;margin-bottom:16px">📋 Registrar Diária</div>
      <div class="field"><label class="label">Prestador *</label>
        <select id="fd-prest" class="inp">
          <option value="">Selecione...</option>
          ${APP.prestadores.map(p=>`<option value="${p.id}" ${APP.prestAtual?.id===p.id?"selected":""}>${p.nome} — ${p.funcao}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label class="label">Obra *</label>
        <select id="fd-obra" class="inp">
          <option value="">Selecione...</option>
          ${APP.obras.map(o=>`<option value="${o.id}">${o.nome}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label class="label">Data</label><input id="fd-data" class="inp" type="date" value="${toDay()}"/></div>
      <div class="field">
        <label class="label">Ocorrência</label>
        <div class="chips" id="oc-chips">
          ${OCORR.map(oc=>`<button class="chip" id="oc-${oc.replace(/\s/g,'_')}" onclick="selecionarOc('${oc}')" style="border:${APP.diariaOc===oc?"2px solid #F59E0B":"1px solid #E5E7EB"};background:${APP.diariaOc===oc?"#FEF3C7":"#F9FAFB"}">${OC_I[oc]} ${oc}</button>`).join("")}
        </div>
      </div>
      <div class="field"><label class="label">Observação</label><input id="fd-obs" class="inp" placeholder="Ex: Trabalhou na fundação..."/></div>
      <div class="field">
        <label class="label">Pagamento</label>
        <div class="toggle-row">
          <button class="toggle-btn" id="dp-pago" onclick="selecionarDiariaPago(true)" style="border:${APP.diariaPago?"2px solid #059669":"1px solid #E5E7EB"};background:${APP.diariaPago?"#D1FAE5":"#F9FAFB"};color:${APP.diariaPago?"#065F46":"#6B7280"}">✅ Pago</button>
          <button class="toggle-btn" id="dp-pend" onclick="selecionarDiariaPago(false)" style="border:${!APP.diariaPago?"2px solid #F59E0B":"1px solid #E5E7EB"};background:${!APP.diariaPago?"#FEF3C7":"#F9FAFB"};color:${!APP.diariaPago?"#92400E":"#6B7280"}">⏳ Pendente</button>
        </div>
      </div>
      <div id="preview-valor"></div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline" id="btn-cancelar-diaria">Cancelar</button>
        <button class="btn-primary" id="btn-salvar-diaria">Salvar</button>
      </div>
    </div>
  `);

  const voltarDiaria = () => { APP.prestView=APP.prestAtual?"detalhe":"lista"; renderEquipe(); };
  qs("btn-voltar-diaria").addEventListener("click", voltarDiaria);
  qs("btn-cancelar-diaria").addEventListener("click", voltarDiaria);

  // Atualiza preview ao mudar prestador ou ocorrência
  const atualizarPreview = () => {
    const prestId = qs("fd-prest")?.value||"";
    const p = APP.prestadores.find(x=>x.id===prestId);
    const oc = APP.diariaOc||"Trabalhou";
    const v = oc==="Trabalhou"?(p?.diaria||0):oc==="Meio período"?(p?.diaria||0)/2:0;
    setHTML("preview-valor", p&&v>0?`<div style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:10px;padding:10px;margin-bottom:12px;font-size:13px;color:#065F46;font-weight:700">💰 Será lançado: ${fmtBRL(v)}</div>`:"");
  };
  qs("fd-prest")?.addEventListener("change", atualizarPreview);

  qs("btn-salvar-diaria").addEventListener("click", async () => {
    const prestId = qs("fd-prest")?.value||"";
    const obraId  = qs("fd-obra")?.value||"";
    const data    = qs("fd-data")?.value||toDay();
    const obs     = qs("fd-obs")?.value||"";
    const oc      = APP.diariaOc||"Trabalhou";
    const pago    = APP.diariaPago!==false;
    if(!prestId||!obraId) { alert("Selecione o prestador e a obra."); return; }
    const p   = APP.prestadores.find(x=>x.id===prestId);
    const val = oc==="Trabalhou"?(p?.diaria||0):oc==="Meio período"?(p?.diaria||0)/2:0;
    const nova = {id:uid(), prestId, obraId, data, oc, obs, pago, valor:val, pNome:p?.nome||""};
    APP.diarias = [nova, ...APP.diarias];
    await dbSave("diarias", APP.diarias);
    if(val>0) {
      const lista = await dbLoad("custos_"+obraId,[]);
      const nc = {id:uid(), desc:`Diária — ${p?.nome}`, cat:"Mão de obra", valor:val, fornecedor:p?.nome||"", data, pago, fase:"Canteiro e despesas gerais"};
      const nl = [nc,...lista];
      await dbSave("custos_"+obraId, nl);
      const total = nl.reduce((a,c)=>a+parseFloat(c.valor||0),0);
      APP.obras = APP.obras.map(o=>o.id===obraId?{...o,custoAtual:total}:o);
      await dbSave("obras", APP.obras);
      if(APP.obraAtual?.id===obraId) { APP.obraAtual={...APP.obraAtual,custoAtual:total}; APP.custosList=nl; }
    }
    APP.prestView = APP.prestAtual?"detalhe":"lista";
    renderEquipe();
  });
}

window.selecionarOc = oc => {
  APP.diariaOc = oc;
  OCORR.forEach(o => {
    const btn=qs(`oc-${o.replace(/\s/g,'_')}`);
    if(btn){btn.style.border=o===oc?"2px solid #F59E0B":"1px solid #E5E7EB";btn.style.background=o===oc?"#FEF3C7":"#F9FAFB";}
  });
  // Recalcular preview do valor
  const prestId = qs("fd-prest")?.value||"";
  const p = APP.prestadores.find(x=>x.id===prestId);
  const v = oc==="Trabalhou"?(p?.diaria||0):oc==="Meio período"?(p?.diaria||0)/2:0;
  setHTML("preview-valor", p&&v>0?`<div style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:10px;padding:10px;margin-bottom:12px;font-size:13px;color:#065F46;font-weight:700">💰 Será lançado: ${fmtBRL(v)}</div>`:"");
};
window.selecionarDiariaPago = v => {
  APP.diariaPago=v;
  const p=qs("dp-pago"),pe=qs("dp-pend");
  if(p){p.style.border=v?"2px solid #059669":"1px solid #E5E7EB";p.style.background=v?"#D1FAE5":"#F9FAFB";p.style.color=v?"#065F46":"#6B7280";}
  if(pe){pe.style.border=!v?"2px solid #F59E0B":"1px solid #E5E7EB";pe.style.background=!v?"#FEF3C7":"#F9FAFB";pe.style.color=!v?"#92400E":"#6B7280";}
};

function renderDetalhePrest() {
  const p=APP.prestAtual;
  const todas=APP.diarias.filter(d=>d.prestId===p.id).sort((a,b)=>(b.data||"").localeCompare(a.data||""));

  const dmes=todas.filter(d=>d.data?.slice(0,7)===mes);
  const meses=[...new Set(todas.map(d=>d.data?.slice(0,7)).filter(Boolean))].sort().reverse();
  const tPago=todas.filter(d=>d.pago!==false).reduce((a,d)=>a+parseFloat(d.valor||0),0);
  const tPend=todas.filter(d=>d.pago===false).reduce((a,d)=>a+parseFloat(d.valor||0),0);
  const tTrab=todas.filter(d=>d.oc==="Trabalhou").length;
  const tFalt=todas.filter(d=>d.oc==="Falta").length;

  setHTML("main-content",`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="btn-outline btn-sm" style="width:auto" id="btn-voltar-detalhe">← Voltar</button>

      <button class="btn-primary btn-sm" style="width:auto" id="btn-add-diaria-detalhe">+ Diária</button>

      ${[["💰 Total pago",fmtBRL(tPago),"#059669"],["⏳ Pendente",fmtBRL(tPend),"#F59E0B"],["✅ Trabalhados",tTrab,"#374151"],["❌ Faltas",tFalt,"#DC2626"]].map(([lb,v,c])=>`<div class="card" style="margin-bottom:0;padding:10px;text-align:center"><div style="font-size:11px;color:#9CA3AF">${lb}</div><div style="font-weight:900;font-size:15px;color:${c}">${v}</div></div>`).join("")}
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:700;font-size:13px">Filtrar por mês</span>
        <input type="month" value="${mes}" onchange="APP.prestMes=this.value;renderDetalhePrest()" style="padding:4px 8px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none"/>
      </div>
      <div style="display:flex;gap:10px;font-size:13px;flex-wrap:wrap">
        <span>✅ <b>${dmes.filter(d=>d.oc==="Trabalhou").length}</b></span>
        <span>⏱️ <b>${dmes.filter(d=>d.oc==="Meio período").length}</b></span>
        <span>❌ <b>${dmes.filter(d=>d.oc==="Falta").length}</b></span>
        <span style="color:#059669;font-weight:700">Pago: ${fmtBRL(dmes.filter(d=>d.pago!==false).reduce((a,d)=>a+parseFloat(d.valor||0),0))}</span>
        ${dmes.some(d=>d.pago===false)?`<span style="color:#F59E0B;font-weight:700">Pend: ${fmtBRL(dmes.filter(d=>d.pago===false).reduce((a,d)=>a+parseFloat(d.valor||0),0))}</span>`:""}
      </div>
    </div>
    ${todas.length===0?`<div style="text-align:center;padding:32px;color:#9CA3AF">Nenhuma diária ainda.</div>`:""}
    <div id="lista-diarias"></div>
  `);

  qs("btn-voltar-detalhe").addEventListener("click",()=>{APP.prestView="lista";APP.prestAtual=null;renderEquipe();});
  qs("btn-add-diaria-detalhe").addEventListener("click",()=>{APP.diariaOc="Trabalhou";APP.diariaPago=true;APP.prestView="form_diaria";renderEquipe();});

    const regs=todas.filter(d=>d.data?.slice(0,7)===m);
    const [ano,mm]=m.split("-");
    const nm=new Date(ano,mm-1,1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:700;font-size:13px;color:#6B7280;text-transform:capitalize">${nm}</div>

      </div>
              ${regs.map(d=>{
        const ob=APP.obras.find(o=>o.id===d.obraId);

              <div style="font-weight:900;font-size:14px;color:#F59E0B">- ${fmtBRL(d.valor)}</div>
              <button onclick="confirmarDeletar('diaria','${d.id}','este adiantamento')" style="background:transparent;border:none;cursor:pointer;font-size:16px">🗑️</button>
            </div>

        </div>`;
        // Card de diária normal
        return `<div class="card" style="border-left:3px solid ${OC_C[d.oc]||"#E5E7EB"}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
                <span style="font-size:16px">${OC_I[d.oc]}</span>
                <span style="font-weight:700;font-size:13px">${fmtDt(d.data)}</span>
                <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${(OC_C[d.oc]||"#9CA3AF")}22;color:${OC_C[d.oc]||"#9CA3AF"};font-weight:700">${d.oc}</span>
              </div>
              <div style="font-size:12px;color:#6B7280">🏗️ ${ob?.nome||"—"}</div>
              ${d.obs?`<div style="font-size:11px;color:#9CA3AF;margin-top:2px">📝 ${d.obs}</div>`:""}

              <button onclick="confirmarDeletar('diaria','${d.id}','esta diária')" style="background:transparent;border:none;cursor:pointer;font-size:16px">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }).join(""));
}
window.togglePagoDiaria = async id => {
  APP.diarias = APP.diarias.map(d=>d.id===id?{...d,pago:d.pago===false?true:false}:d);
  await dbSave("diarias", APP.diarias);
  renderDetalhePrest();
};

window.abrirAdiantamento = (prestId) => {
  const modal = qs("modal-confirm");
  modal.style.display = "flex";
  modal.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-weight:800;font-size:18px;color:#1F2937">💵 Registrar Adiantamento</div>
      <button onclick="qs('modal-confirm').style.display='none'" style="background:#F3F4F6;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer">✕</button>
    </div>
    <div class="field"><label class="label">Valor adiantado (R$) *</label><input id="adt-valor" class="inp" type="number" placeholder="Ex: 150"/></div>
    <div class="field"><label class="label">Data</label><input id="adt-data" class="inp" type="date" value="${toDay()}"/></div>
    <div class="field"><label class="label">Observação</label><input id="adt-obs" class="inp" placeholder="Ex: Adiantamento semanal"/></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn-outline" onclick="qs('modal-confirm').style.display='none'">Cancelar</button>
      <button class="btn-primary" id="btn-salvar-adt">💾 Salvar</button>
    </div>
  </div>`;
  qs("btn-salvar-adt").addEventListener("click", async () => {
    const valor = parseFloat(qs("adt-valor")?.value||0);
    if(!valor) { alert("Informe o valor."); return; }
    const adt = {
      id: uid(), prestId,
      valor, data: qs("adt-data")?.value||toDay(),
      obs: qs("adt-obs")?.value||"",
      tipo: "adiantamento"
    };
    APP.diarias = [adt, ...APP.diarias];
    await dbSave("diarias", APP.diarias);
    qs("modal-confirm").style.display = "none";
    renderDetalhePrest();
  });
};

// ── Selecionar Obra (checklist/custos no nav) ──────────────────────────────────
function renderSelObra() {
  const aba = APP.selObraDestino||"custos";
  setHTML("main-content",`
    <div style="font-weight:800;font-size:20px;color:#1F2937;margin-bottom:16px">Selecionar Obra</div>
    <div style="font-size:12px;color:#9CA3AF;margin-bottom:8px">Selecione a obra para acessar ${aba==="checklist"?"o checklist":"os custos"}:</div>
    <div id="sel-obra-lista"></div>
  `);
  setHTML("sel-obra-lista", APP.obras.length===0?`<div style="text-align:center;padding:40px;color:#9CA3AF">Adicione uma obra primeiro.</div>`:
    APP.obras.map(o=>`<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:12px" id="sel-${o.id}">
      <span style="font-size:24px">${o.thumb||"🏠"}</span>
      <div><div style="font-weight:700">${o.nome}</div><div style="font-size:12px;color:#6B7280">${o.cliente}</div></div>
    </div>`).join(""));
  APP.obras.forEach(o => {
    const card=qs(`sel-${o.id}`);
    if(card) card.addEventListener("click", async () => {
      await abrirObra(o.id);
      await mudarAba(APP.selObraDestino||"custos");
    });
  });
}

// ── Nav ───────────────────────────────────────────────────────────────────────
window.navTo = async p => {
  if(p==="checklist"||p==="custos") {
    APP.selObraDestino = p;
    APP.page = "sel_obra";
    renderPage();
    return;
  }
  if(p==="equipe") { APP.prestView="lista"; APP.prestAtual=null; }
  APP.page = p;
  renderPage();
};

// ── Backup ────────────────────────────────────────────────────────────────────
qs("btn-backup").addEventListener("click", async () => {
  try {
    const backup = {data:new Date().toISOString(),versao:"2.0",obras:APP.obras,prestadores:APP.prestadores,diarias:APP.diarias,custos:{},checklist:{},diario:{}};
    for(const o of APP.obras) {
      backup.custos[o.id]    = await dbLoad("custos_"+o.id,[]);
      backup.checklist[o.id] = await dbLoad("check_"+o.id,{});
      backup.diario[o.id]    = await dbLoad("diario_"+o.id,[]);
    }
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`habita-backup-${toDay()}.json`; a.click();
    URL.revokeObjectURL(url);
    alert("✅ Backup salvo com sucesso!");
  } catch(e) { alert("Erro: "+e.message); }
});

// ── Init ──────────────────────────────────────────────────────────────────────
window.renderPage = renderPage;
window.abrirObra = abrirObra;
window.mudarAba = mudarAba;
window.abrirFormObra = () => abrirFormObra(null);
window.abrirEditObra = id => abrirFormObra(APP.obras.find(o=>o.id===id));
window.concluirObra = async id => {
  APP.obras = APP.obras.map(o => o.id===id ? {...o,status:"Finalizada",progresso:100} : o);
  await dbSave("obras", APP.obras);
  renderObras();
};
window.renderObras = renderObras;
window.renderEquipe = renderEquipe;
window.renderDetalhePrest = renderDetalhePrest;

async function init() {
  setHTML("main-content",`<div style="text-align:center;padding:60px;color:#9CA3AF"><div class="spin" style="font-size:32px">⏳</div><div style="margin-top:12px">Carregando...</div></div>`);
  const [obras,prest,diarias] = await Promise.all([dbLoad("obras",[]),dbLoad("prestadores",[]),dbLoad("diarias",[])]);
  APP.obras = obras; APP.prestadores = prest; APP.diarias = diarias;
  renderPage();
}
init();
</script>
</body>
</html>
